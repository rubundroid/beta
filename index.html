<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS Pay Scale Lookup — Kerala Govt</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#eef2f7;color:#1a1a2e;min-height:100vh}
header{background:linear-gradient(135deg,#1a237e,#0d47a1);color:#fff;padding:1rem 1.2rem;text-align:center}
header h1{font-size:1.25rem;font-weight:700;margin-bottom:.2rem}
header p{font-size:.78rem;opacity:.8}
.wrap{max-width:700px;margin:0 auto;padding:1rem .9rem}
.card{background:#fff;border-radius:12px;padding:1.2rem;margin-bottom:.9rem;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.sec{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#5c6bc0;margin-bottom:.8rem}
label{display:block;font-size:.82rem;font-weight:600;color:#555;margin:.75rem 0 .3rem}
label:first-of-type{margin-top:0}
select,input{width:100%;padding:.62rem .85rem;border:1.5px solid #dde;border-radius:8px;font-size:.92rem;color:#1a1a2e;background:#fff;appearance:auto;-webkit-appearance:auto}
select:focus,input:focus{outline:none;border-color:#3f51b5}
.srchwrap{position:relative}
.srchwrap input{padding-left:2.1rem}
.srchwrap::before{content:"🔍";position:absolute;left:.65rem;top:50%;transform:translateY(-50%);font-size:.78rem;pointer-events:none}
.list{border:1.5px solid #dde;border-radius:8px;max-height:220px;overflow-y:auto;background:#fff;margin-top:.3rem}
.list-item{padding:.6rem .85rem;font-size:.87rem;cursor:pointer;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.list-item:last-child{border-bottom:none}
.list-item:hover,.list-item.sel{background:#e8eaf6}
.list-item .code{font-size:.72rem;color:#aaa;flex-shrink:0}
.list-item .inactive{color:#ccc}
.list-empty{padding:.9rem;text-align:center;color:#bbb;font-size:.85rem}
.badge{display:inline-block;background:#e8eaf6;color:#3f51b5;font-weight:800;font-size:.95rem;padding:.2rem .75rem;border-radius:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:.6rem}
.ibox{background:#f7f8ff;border:1.5px solid #e8eaf6;border-radius:8px;padding:.65rem}
.ibox.hi{background:#e8f5e9;border-color:#a5d6a7}
.ibox .lbl{font-size:.68rem;color:#aaa;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.ibox .val{font-size:.85rem;font-weight:600;margin-top:.1rem;word-break:break-all;font-family:'Courier New',monospace}
.ibox.hi .val{color:#2e7d32;font-family:inherit}
button{width:100%;padding:.72rem;background:#1a237e;color:#fff;border:none;border-radius:8px;font-size:.92rem;font-weight:600;cursor:pointer;margin-top:.7rem}
button:hover{background:#283593}
button:disabled{background:#bbb;cursor:default}
/* Timeline */
.tline{margin-top:.3rem}
.trow{display:flex;align-items:flex-start;gap:.7rem;padding:.65rem 0;border-bottom:1px solid #f2f2f2}
.trow:last-child{border-bottom:none}
.trow.cur{background:#fff8e1;margin:0 -1.2rem;padding:.65rem 1.2rem;border-left:4px solid #f9a825}
.t-yr{font-weight:700;font-size:.8rem;color:#aaa;min-width:36px;padding-top:.1rem}
.t-yr.cur{color:#f57f17}
.t-sc{flex:1;font-size:.8rem;color:#444;font-family:'Courier New',monospace;line-height:1.5}
.t-mm{font-size:.76rem;color:#ccc;min-width:110px;text-align:right;padding-top:.1rem}
.notice{background:#fff3e0;border:1px solid #ffcc80;border-radius:8px;padding:.8rem;font-size:.82rem;color:#e65100;line-height:1.5;margin-top:.5rem}
/* Loading */
.loading{text-align:center;padding:2rem;color:#888;font-size:.9rem}
.spinner{width:32px;height:32px;border:3px solid #e8eaf6;border-top-color:#3f51b5;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto .8rem}
@keyframes spin{to{transform:rotate(360deg)}}
.tag-y{background:#c8e6c9;color:#2e7d32;font-size:.7rem;padding:.1rem .4rem;border-radius:4px;font-weight:700}
.tag-n{background:#ffcdd2;color:#c62828;font-size:.7rem;padding:.1rem .4rem;border-radius:4px;font-weight:700}
@media(max-width:500px){.grid2{grid-template-columns:1fr}.t-mm{display:none}}
</style>
</head>
<body>
<header>
  <h1>📋 GIS Pay Scale Lookup</h1>
  <p>Kerala Government · Designation ↔ Historical Pay Scale Reference</p>
</header>

<div class="wrap">

  <!-- Loading -->
  <div class="card" id="cLoad">
    <div class="loading">
      <div class="spinner"></div>
      <div>Designations data load ആകുന്നു…</div>
    </div>
  </div>

  <!-- Dept + Designation -->
  <div class="card" id="cSel" style="display:none">
    <div class="sec">🔍 Department &amp; Designation</div>

    <label>Department</label>
    <select id="deptSel" onchange="onDept()">
      <option value="">— Department select ചെയ്യുക —</option>
    </select>

    <label>Designation തിരയുക</label>
    <div class="srchwrap">
      <input type="text" id="srch" placeholder="Code അല്ലെങ്കിൽ name…" oninput="filterList()" disabled>
    </div>
    <div class="list" id="desList"><div class="list-empty">ആദ്യം department select ചെയ്യുക</div></div>
  </div>

  <!-- Info + Date -->
  <div class="card" id="cMain" style="display:none">
    <div class="sec" id="infoSec">📊 Designation</div>
    <div id="infoBox"></div>

    <label style="margin-top:1rem">📅 Month &amp; Year (GIS Reference Date)</label>
    <input type="month" id="dateIn" min="1983-07" max="2099-12">
    <button onclick="doLookup()">Scale കണ്ടുപിടിക്കുക →</button>
  </div>

  <!-- Result + Timeline -->
  <div class="card" id="cResult" style="display:none">
    <div class="sec">✅ Result</div>
    <div id="resultBox"></div>
    <div style="margin-top:1.2rem;padding-top:1rem;border-top:1px solid #f0f0f0">
    <div class="sec">📜 Scale History (1983 → 2019)</div>
    <div class="tline" id="tlBox"></div>
    </div>
  </div>

</div>

let DATA = {};
let curList = [];
let selD = null;

// ── Load JSON ─────────────────────────────────────────────────────────────────
fetch('designations.json')
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(json => {
    DATA = json;
    const sel = document.getElementById('deptSel');
    Object.keys(DATA).sort().forEach(dept => {
      const o = document.createElement('option');
      o.value = dept;
      o.textContent = dept + ' (' + DATA[dept].length + ')';
      sel.appendChild(o);
    });
    document.getElementById('cLoad').style.display = 'none';
    document.getElementById('cSel').style.display = 'block';
  })
  .catch(e => {
    document.getElementById('cLoad').innerHTML =
      '<div class="notice">⚠️ designations.json load ആകാൻ കഴിഞ്ഞില്ല.<br>File same folder-ൽ ഉണ്ടോ? Error: ' + e.message + '</div>';
  });

// ── Dept / Designation ────────────────────────────────────────────────────────
function onDept() {
  const dept = document.getElementById('deptSel').value;
  selD = null;
  document.getElementById('cMain').style.display = 'none';
  document.getElementById('cResult').style.display = 'none';
  document.getElementById('srch').value = '';
  if (!dept) { document.getElementById('desList').innerHTML = '<div class="list-empty">Department select ചെയ്യുക</div>'; return; }
  curList = DATA[dept] || [];
  document.getElementById('srch').disabled = false;
  renderList(curList);
}

function filterList() {
  const q = document.getElementById('srch').value.toLowerCase();
  renderList(q ? curList.filter(d => d.d.toLowerCase().includes(q) || d.c.includes(q)) : curList);
}

function renderList(list) {
  const el = document.getElementById('desList');
  if (!list.length) { el.innerHTML = '<div class="list-empty">Results ഇല്ല</div>'; return; }
  el.innerHTML = list.map(d =>
    `<div class="list-item${d.a==='N'?' inactive':''}" onclick="selectDesig('${d.c}')">
      <span>${d.d}${d.a==='N'?' <span class="tag-n">Inactive</span>':''}</span>
      <span class="code">${d.c}</span>
    </div>`
  ).join('');
}

function selectDesig(code) {
  const dept = document.getElementById('deptSel').value;
  const desig = (DATA[dept] || []).find(d => d.c === code);
  if (!desig) return;
  selD = desig;

  // Highlight in list
  document.querySelectorAll('.list-item').forEach(el => el.classList.remove('sel'));
  const items = document.querySelectorAll('.list-item');
  items.forEach(el => { if (el.querySelector('.code')?.textContent === code) el.classList.add('sel'); });

  renderInfo(desig);
  document.getElementById('cMain').style.display = 'block';
  document.getElementById('cResult').style.display = 'none';
  document.getElementById('cMain').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── Parse pay scale → S-number ────────────────────────────────────────────────
function parsePay(ps) {
  if (!ps) return { type: 'empty' };
  if (ps.startsWith('State-')) {
    const p = ps.slice(6).split('-');
    const mn = parseInt(p[0]);
    const sn = PR.minToSNumber_2019[String(mn)] || null;
    return { type: 'state', raw: ps, min: mn, max: parseInt(p[p.length-1]), sNumber: sn };
  }
  if (ps.startsWith('KAS-'))       return { type: 'kas',          raw: ps };
  if (ps.startsWith('Judicial'))   return { type: 'judicial',     raw: ps };
  if (/^consolidated/i.test(ps))  return { type: 'consolidated', raw: ps };
  if (ps.startsWith('Part-time')) return { type: 'parttime',     raw: ps };
  if (ps.startsWith('Level'))     return { type: 'level7cpc',    raw: ps };
  if (ps.startsWith('All India')) return { type: 'ais',          raw: ps };
  return { type: 'other', raw: ps };
}

const TLABELS = {
  kas:'KAS Scale', judicial:'Judicial Scale', consolidated:'Consolidated Pay',
  parttime:'Part-time Pay', level7cpc:'7th CPC Level Scale', ais:'All India Services Scale', other:'Special Scale'
};

function renderInfo(d) {
  const ps = parsePay(d.p);
  let sBox = ps.sNumber
    ? `<div class="ibox hi"><div class="lbl">S-Number</div><div class="val"><span class="badge">${ps.sNumber}</span></div></div>`
    : `<div class="ibox"><div class="lbl">Scale Type</div><div class="val" style="font-family:inherit">${TLABELS[ps.type]||'Special'}</div></div>`;

  document.getElementById('infoSec').textContent = '📊 ' + d.d;
  document.getElementById('infoBox').innerHTML = `
    <div class="grid2">
      ${sBox}
      <div class="ibox"><div class="lbl">Current Scale (2019)</div><div class="val">${d.p||'—'}</div></div>
    </div>
    ${!ps.sNumber ? `<div class="notice" style="margin-top:.6rem">⚠️ ${TLABELS[ps.type]||'Special Scale'} — S-Number mapping available ല്ല. Manual reference ആവശ്യമായി വരാം.</div>` : ''}
  `;
}

// ── Revision lookup ───────────────────────────────────────────────────────────
function getRevision(ym) {
  const d = new Date(ym + '-01');
  const revs = PR.revisionDates;
  for (let i = revs.length - 1; i >= 0; i--) {
    if (d >= new Date(revs[i].effectiveFrom)) return revs[i];
  }
  return null;
}

function doLookup() {
  const ym = document.getElementById('dateIn').value;
  if (!ym) { alert('Month & Year select ചെയ്യുക'); return; }
  if (!selD) return;

  const ps = parsePay(selD.p);
  const rev = getRevision(ym);
  const [yr, mo] = ym.split('-');
  const moML = new Date(ym + '-01').toLocaleString('ml-IN', { month: 'long' });

  const resEl = document.getElementById('resultBox');
  const tlEl  = document.getElementById('tlBox');
  document.getElementById('cResult').style.display = 'block';

  if (!rev) {
    resEl.innerHTML = '<div class="notice">⚠️ 1983 July-ന് മുൻപുള്ള date — data available ല്ല.</div>';
    tlEl.innerHTML = '';
    return;
  }

  if (!ps.sNumber) {
    resEl.innerHTML = `<div class="notice">⚠️ ${TLABELS[ps.type]||'Special Scale'} (${ps.raw||'—'}) — Historical lookup available ല്ല.</div>`;
    tlEl.innerHTML = '';
    return;
  }

  const sd = PR.scales[rev.id]?.[ps.sNumber];

  resEl.innerHTML = `
    <div style="font-size:.8rem;color:#999;margin-bottom:.6rem">${yr} ${moML} — ${selD.d}</div>
    <div class="grid2">
      <div class="ibox hi"><div class="lbl">Pay Revision</div><div class="val" style="font-family:inherit">${rev.label}</div></div>
      <div class="ibox hi"><div class="lbl">S-Number</div><div class="val"><span class="badge">${ps.sNumber}</span></div></div>
      <div class="ibox hi" style="grid-column:1/-1"><div class="lbl">Pay Scale at ${yr} ${moML}</div>
        <div class="val">${sd ? sd.scale : '— Not available for this revision'}</div></div>
    </div>
    ${sd ? `<div style="margin-top:.5rem;font-size:.78rem;color:#888">Min ₹${sd.min.toLocaleString('en-IN')} · Max ₹${sd.max.toLocaleString('en-IN')}</div>` : ''}
    <div style="margin-top:.3rem;font-size:.72rem;color:#ccc">${rev.go}</div>
  `;

  // Timeline
  tlEl.innerHTML = PR.revisionDates.map(r => {
    const s = PR.scales[r.id]?.[ps.sNumber];
    const cur = r.id === rev.id;
    return `<div class="trow${cur?' cur':''}">
      <div class="t-yr${cur?' cur':''}">${r.id}</div>
      <div class="t-sc">${s ? s.scale : '<span style="color:#ddd">—</span>'}</div>
      <div class="t-mm">${s ? '₹'+s.min.toLocaleString('en-IN')+'–'+s.max.toLocaleString('en-IN') : ''}</div>
    </div>`;
  }).join('');

  document.getElementById('cResult').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
</body>
</html>
